env_settings:
  num_areas: 40

behaviors:
  GFSX_Brain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      learning_rate: 0.00025
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        sequence_length: 64
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 15000000
    time_horizon: 1000
    summary_freq: 20000

environment_parameters:
  obstacle_penalty_scale: 0.001
  ir_collision_penalty: 0.002
  distance_reward_near: 4
  distance_reward_far: 2
  centering_reward_scale: 0.004
  success_reward: 30
  backwardPenalty: 0.0005
  action_rate_penalty: 0.0001