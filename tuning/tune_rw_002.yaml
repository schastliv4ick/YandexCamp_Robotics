env_settings:
  num_areas: 40
behaviors:
  GFSX_Brain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 102400
      learning_rate: 0.00025
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        sequence_length: 64
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 1
    max_steps: 200000
    time_horizon: 1000
    summary_freq: 10000
environment_parameters:
  success_reward: 3.76352
  distance_reward_near: 0.17027
  distance_reward_far: 0.08953
  centering_reward_scale: 0.00065
  action_rate_penalty: 0.04029
  obstacle_penalty_scale: 0.13963
  ir_collision_penalty: 0.03403
  backward_penalty: 0.00777
