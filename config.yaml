env_settings:
  num_areas: 40

behaviors:
  GFSX_Brain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 40960
      learning_rate: 2.5e-4
      learning_rate_schedule: linear
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
      memory:
        sequence_length: 64
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 50000000
    time_horizon: 512
    summary_freq: 20000
    checkpoint_interval: 500000
    keep_checkpoints: 10

environment_parameters:

  ball_max_distance:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.5
      max_value: 3.0

  episode_length:
    sampler_type: uniform
    sampler_parameters:
      min_value: 1500
      max_value: 1500

  ball_scale:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.04
      max_value: 0.07

  ball_mass:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.05
      max_value: 0.2

  vision_noise:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.02
      max_value: 0.06

  vision_dropout:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.05
      max_value: 0.15
